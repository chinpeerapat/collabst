name: Deploy to self-hosted runner

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy .env from runner
        run: |
          if [ -f /etc/runner-configs/.env ]; then
            mkdir -p config/env
            cp /etc/runner-configs/.env config/env/.env
          else
            echo ".env file not found in /etc/runner-configs/"
            exit 1
          fi

      - name: Deploy with Docker Compose
        run: |
          make stop
          make startd ARGS=--build
